<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1C Rush — Регистрация</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body data-page="register">
    <div class="wrapper">
        <header class="header">
            <div class="container header-container">
                <div class="logo">
                    <span class="logo-text">1C Rush</span>
                </div>
                <nav class="nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="../practical-tasks/practical.html" class="nav-link">Тренажёр</a>
                    <a href="../textbook/pages/variables.html" class="nav-link">Справочник</a>
                    <a href="profile.html" class="nav-link">Профиль</a>
                </nav>
                <div class="auth-area" id="authArea"></div>
            </div>
        </header>

        <main class="main">
            <div class="auth-form">
                <h1 style="font-size:2.5rem; text-align:center; margin-bottom:24px; background:linear-gradient(135deg,#FFFFFF,#98C3F8,#818CF8);background-clip:text;-webkit-background-clip:text;color:transparent;">Регистрация</h1>
                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Пароль</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <div class="error-message" id="registerError"></div>
                    <button type="submit" class="form-submit">Зарегистрироваться</button>
                </form>
                <div class="form-footer">
                    Уже есть аккаунт? <a href="login.html">Войти</a>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>© 2026 1C Rush — Платформа для разработчиков 1С</p>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
